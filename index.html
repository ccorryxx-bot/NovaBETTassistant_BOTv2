<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Diamond-BETT Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body oncontextmenu="return false;">
<div class="bg">
  <div class="bg-noise"></div>
  <div class="bg-lines"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<div class="overlay" id="overlay" onclick="closeAdmin()"></div>

<div id="adminPanel">
  <!-- Admin Gate -->
  <div class="admin-gate" id="admin-gate">
    <div class="gate-icon"><i class="fas fa-shield-halved"></i></div>
    <div class="gate-title">Admin Access Required</div>
    <div class="gate-input-wrap">
      <input type="password" id="adminPasswordInput" placeholder="Enter Admin Password" autocomplete="off"/>
    </div>
    <button class="gate-btn" onclick="tryUnlockAdmin()">Unlock Console</button>
  </div>

  <!-- Admin Main Content -->
  <div class="admin-main-content" id="admin-main-content">
    <div class="panel-hd">
      <div class="panel-brand">
        <div class="panel-logo"><i class="fas fa-user-gear"></i></div>
        <div>
          <div class="panel-ttl">Admin Dashboard</div>
          <div class="panel-sub">v4.0 // Diamond-BETT</div>
        </div>
      </div>
      <button class="panel-close" onclick="closeAdmin()"><i class="fas fa-times"></i></button>
    </div>

    <div class="panel-tabs">
      <button class="tab-btn active" id="tab-kb-btn" onclick="switchTab('kb')"><i class="fas fa-brain"></i>KB</button>
      <button class="tab-btn" id="tab-config-btn" onclick="switchTab('config')"><i class="fas fa-gears"></i>Config</button>
      <button class="tab-btn" id="tab-logs-btn" onclick="switchTab('logs')"><i class="fas fa-list-check"></i>Logs</button>
    </div>

    <div class="tab-panel active" id="tab-kb">
      <div class="panel-lbl">// knowledge_base.md</div>
      <textarea id="knowledgeBase" placeholder="Enter AI knowledge base content..."></textarea>
      <button id="saveBtn" onclick="saveToCloud()"><i class="fas fa-cloud-arrow-up"></i> Update KB</button>
    </div>

    <div class="tab-panel" id="tab-config">
      <div class="panel-lbl">// system_environment.config</div>
      <div class="config-group">
        <label>Worker API URL</label>
        <input type="text" id="workerUrlInput" placeholder="https://..."/>
      </div>
      <div class="config-group">
        <label>AI Model Name</label>
        <input type="text" id="modelNameInput" placeholder="e.g. Llama-3-70B"/>
      </div>
      <div class="config-group">
        <label>Floating Questions (One per line)</label>
        <textarea id="floatingQuestionsInput" rows="3" placeholder="မင်းဒီနေ့ ဘယ်လိုလဲ?🧐"></textarea>
      </div>
      <div class="toggle-group">
        <input type="checkbox" id="enableFloatingToggle" checked/>
        <label for="enableFloatingToggle">Enable Floating Notifications</label>
      </div>
      <button id="saveConfigBtn" onclick="saveSystemConfig()">Save System Config</button>
    </div>

    <div class="tab-panel" id="tab-logs">
      <div class="panel-lbl">// session_history.log</div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
</div>

<div class="shell">
  <div class="floating-bubble" id="floatingBubble"></div>
  <button class="scroll-fab" id="scrollFab" onclick="scrollDown()"><i class="fas fa-arrow-down"></i></button>

  <header>
    <div class="hd-logo" onclick="secretClick(event)">
      <div class="logo-3d-wrap">
        <div class="hologram-bot"><i class="fas fa-user-astronaut"></i></div>
      </div>
    </div>
    <div class="hd-info">
      <div class="hd-name">Diamond-BETT Helper</div>
      <div class="hd-tagline">
        <span class="hd-tagline-dot"></span>
        <span class="hd-tagline-txt">Online · Premium AI Support</span>
      </div>
    </div>
    <div class="hd-right">
      <div class="hd-stat">
        <div class="hd-stat-num"><i class="fas fa-signal"></i><span>247</span></div>
        <div class="hd-stat-lbl">Active Now</div>
      </div>
      <button class="hd-admin-btn" onclick="openAdmin()"><i class="fas fa-lock"></i></button>
    </div>
  </header>

  <div class="chatbox" id="chatbox"></div>

  <div class="quick-grid">
    <button class="q-btn" onclick="quickSend('အကောင့်ဖွင့်နည်း သိချင်ပါတယ်')"><i class="fas fa-id-card"></i><span>အကောင့်</span></button>
    <button class="q-btn" onclick="quickSend('ငွေသွင်းနည်း ရှင်းပြပေးပါ')"><i class="fas fa-coins"></i><span>ငွေသွင်း</span></button>
    <button class="q-btn" onclick="quickSend('ပရိုမိုးရှင်းတွေ ပြောပြပါ')"><i class="fas fa-fire"></i><span>ပရိုမိုးရှင်း</span></button>
    <button class="q-btn" onclick="quickSend('ဂိမ်းအနိုင်ခန်းများ ကြည့်ချင်ပါ')"><i class="fas fa-chart-line"></i><span>အနိုင်ခန်း</span></button>
    <button class="q-btn" onclick="quickSend('Password ပြောင်းနည်း သိချင်ပါ')"><i class="fas fa-shield"></i><span>လုံခြုံရေး</span></button>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="မေးမြန်းလိုသည်များကို ရိုက်ထည့်ပါ..." rows="1"></textarea>
    <button id="sendBtn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
