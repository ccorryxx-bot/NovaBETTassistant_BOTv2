<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>NovaBETT – Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="style.css"/>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
@keyframes shake{
  0%,100%{transform:translateX(0);}
  18%{transform:translateX(-7px);}
  36%{transform:translateX(7px);}
  54%{transform:translateX(-5px);}
  72%{transform:translateX(5px);}
  90%{transform:translateX(-2px);}
}
</style>

</head>

<body>

<!-- FIX:
SVG block ကို HEAD ထဲကနေ BODY ထဲပြောင်းထား -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <symbol id="ico-logo" viewBox="0 0 36 36">
    <polygon points="18,2 32,10 32,26 18,34 4,26 4,10"
      fill="none"
      stroke="currentColor"
      stroke-width="1.6"/>
  </symbol>

  <symbol id="ico-send" viewBox="0 0 24 24">
    <path d="M5 12h14M13 6l6 6-6 6"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
  </symbol>

  <symbol id="ico-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3"
      stroke="currentColor"
      stroke-width="1.8"
      fill="none"/>
  </symbol>

  <symbol id="ico-db" viewBox="0 0 24 24">
    <ellipse cx="12" cy="5" rx="9" ry="3"
      stroke="currentColor"
      stroke-width="1.8"
      fill="none"/>
  </symbol>

  <symbol id="ico-log" viewBox="0 0 24 24">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
      stroke="currentColor"
      stroke-width="1.8"
      fill="none"/>
  </symbol>

  <symbol id="ico-upload" viewBox="0 0 24 24">
    <polyline points="16 16 12 12 8 16"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      fill="none"/>
  </symbol>

  <symbol id="ico-x" viewBox="0 0 24 24">
    <line x1="18" y1="6" x2="6" y2="18"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"/>
  </symbol>

</svg>

<!-- APP -->
<canvas id="particleCanvas"></canvas>

<div class="bg">
  <div class="bg-noise"></div>
  <div class="bg-lines"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="overlay" id="overlay" onclick="closeAdmin()"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <div class="panel-hd">

    <div>

      <div class="panel-brand">

        <div class="panel-logo">
          <svg><use href="#ico-settings"/></svg>
        </div>

        <div>
          <div class="panel-ttl">Admin Console</div>
          <div class="panel-sub">// NovaBETT Control Panel</div>
        </div>

      </div>

    </div>

    <button class="panel-close" onclick="closeAdmin()">
      <svg><use href="#ico-x"/></svg>
    </button>

  </div>

  <div class="panel-tabs">

    <button class="tab-btn active"
      id="tab-kb-btn"
      onclick="switchTab('kb')">

      <svg><use href="#ico-db"/></svg>
      Knowledge Base

    </button>

    <button class="tab-btn"
      id="tab-logs-btn"
      onclick="switchTab('logs')">

      <svg><use href="#ico-log"/></svg>
      Chat Logs

    </button>

  </div>

  <div class="tab-panel active" id="tab-kb">

    <div class="panel-lbl">// knowledge_base.config</div>

    <textarea
      id="knowledgeBase"
      placeholder="Knowledge Base အချက်အလက်များ ဖြည့်သွင်းပါ..."
    ></textarea>

    <button id="saveBtn" onclick="saveToCloud()">
      <svg><use href="#ico-upload"/></svg>
      Push to Cloud
    </button>

  </div>

  <div class="tab-panel" id="tab-logs">

    <div class="panel-lbl">// recent_sessions.log</div>

    <div class="log-box" id="logBox">
      <div class="log-empty">Loading sessions…</div>
    </div>

  </div>

</div>

<!-- MAIN -->
<div class="shell">

  <header>

    <div class="hd-logo" onclick="openAdmin()">
      <svg><use href="#ico-logo"/></svg>
    </div>

    <div class="hd-info">
      <div class="hd-name">NovaBETT – Game</div>
    </div>

  </header>

  <div class="chatbox" id="chatbox"></div>

  <footer>

    <div class="input-field-wrap">

      <input
        type="text"
        id="userInput"
        placeholder="မေးမြန်းလိုသည်များ ရိုက်ထည့်ပါ..."
        onkeydown="if(event.key==='Enter')handleSend()"
      />

    </div>

    <button
      class="send-btn"
      id="sendBtn"
      onclick="handleSend()"
    >
      <svg><use href="#ico-send"/></svg>
    </button>

  </footer>

</div>

<!-- IMPORTANT FIX:
app.js ကို BODY အောက်ဆုံးမှာထား -->
<script src="app.js"></script>

</body>
</html>
