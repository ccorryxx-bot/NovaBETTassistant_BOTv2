<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>NovaBETT – Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- SVG Symbol Library -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ico-logo" viewBox="0 0 36 36">
    <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <polygon points="18,8 27,13 27,23 18,28 9,23 9,13" fill="currentColor" opacity=".18"/>
    <line x1="4"  y1="10" x2="18" y2="18" stroke="currentColor" stroke-width="1" opacity=".4"/>
    <line x1="32" y1="10" x2="18" y2="18" stroke="currentColor" stroke-width="1" opacity=".4"/>
    <line x1="4"  y1="26" x2="18" y2="18" stroke="currentColor" stroke-width="1" opacity=".4"/>
    <line x1="32" y1="26" x2="18" y2="18" stroke="currentColor" stroke-width="1" opacity=".4"/>
    <circle cx="18" cy="18" r="2.5" fill="currentColor"/>
  </symbol>
  <symbol id="ico-send" viewBox="0 0 24 24">
    <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </symbol>
  <symbol id="ico-users" viewBox="0 0 24 24">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>

  <symbol id="ico-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>

  </symbol>
  <symbol id="ico-db" viewBox="0 0 24 24">
    <ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke="currentColor" stroke-width="1.8" fill="none"/>
  </symbol>
  <symbol id="ico-log" viewBox="0 0 24 24">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" fill="none"/>
  </symbol>
  <symbol id="ico-upload" viewBox="0 0 24 24">
    <polyline points="16 16 12 12 8 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <line x1="12" y1="12" x2="12" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-up" viewBox="0 0 24 24">
    <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-down" viewBox="0 0 24 24">
    <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-x" viewBox="0 0 24 24">
    <line x1="18" y1="6"  x2="6"  y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="6"  y1="6"  x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="ico-chevdown" viewBox="0 0 24 24">
    <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-account" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.7" fill="none"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-wallet" viewBox="0 0 24 24">
    <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.7" fill="none"/>
    <path d="M16 12h.01" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M2 10h20" stroke="currentColor" stroke-width="1.7"/>
  </symbol>
  <symbol id="ico-gift" viewBox="0 0 24 24">
    <polyline points="20 12 20 22 4 22 4 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    <rect x="2" y="7" width="20" height="5" stroke="currentColor" stroke-width="1.7" fill="none"/>
    <line x1="12" y1="22" x2="12" y2="7" stroke="currentColor" stroke-width="1.7"/>
    <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" stroke="currentColor" stroke-width="1.7" fill="none"/>
  </symbol>
  <symbol id="ico-trophy" viewBox="0 0 24 24">
    <path d="M6 9H3L4 4h16l1 5h-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    <path d="M12 17v4M8 21h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M6 9a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.7" fill="none"/>
  </symbol>
  <symbol id="ico-key" viewBox="0 0 24 24">
    <circle cx="8" cy="15" r="5" stroke="currentColor" stroke-width="1.7" fill="none"/>
    <path d="M21 2l-9.6 9.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M15.5 7.5l3 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M14 14l1.5 1.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
  </symbol>
  <symbol id="ico-bot" viewBox="0 0 36 36">
    <rect x="6" y="12" width="24" height="18" rx="4" stroke="currentColor" stroke-width="1.6" fill="none"/>
    <circle cx="13" cy="20" r="2.2" fill="currentColor" opacity=".7"/>
    <circle cx="23" cy="20" r="2.2" fill="currentColor" opacity=".7"/>
    <line x1="18" y1="12" x2="18" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="18" cy="5.5" r="1.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M13 26h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6"  y1="20" x2="2"  y2="20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="34" y2="20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>
  <symbol id="ico-lock" viewBox="0 0 24 24">
    <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="12" cy="16" r="1.5" fill="currentColor" opacity=".7"/>
  </symbol>
  <symbol id="ico-unlock" viewBox="0 0 24 24">
    <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M7 11V7a5 5 0 0 1 9.9-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="12" cy="16" r="1.5" fill="currentColor" opacity=".7"/>
  </symbol>
  <symbol id="ico-shield" viewBox="0 0 24 24">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <polyline points="9 12 11 14 15 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>
  <symbol id="ico-eye" viewBox="0 0 24 24">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.7" fill="none"/>
    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7" fill="none"/>
  </symbol>
  <symbol id="ico-eye-off" viewBox="0 0 24 24">
    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
  </symbol>
</svg>

<style>
@keyframes shake{
  0%,100%{transform:translateX(0);}
  18%{transform:translateX(-7px);}
  36%{transform:translateX(7px);}
  54%{transform:translateX(-5px);}
  72%{transform:translateX(5px);}
  90%{transform:translateX(-2px);}
}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>

<div class="bg">
  <div class="bg-noise"></div>
  <div class="bg-lines"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="overlay" id="overlay" onclick="closeAdmin()"></div>

<div id="adminPanel">
  <div class="panel-hd">
    <div>
      <div class="panel-brand">
        <div class="panel-logo"><svg><use href="#ico-settings"/></svg></div>
        <div>
          <div class="panel-ttl">Admin Console</div>
          <div class="panel-sub">// NovaBETT Control Panel</div>
        </div>
      </div>
      <div class="panel-sync">
        <span class="sync-dot"></span>
        <span class="sync-txt">Firebase Sync Active</span>
      </div>
    </div>
    <button class="panel-close" onclick="closeAdmin()"><svg><use href="#ico-x"/></svg></button>
  </div>

  <div class="panel-tabs">
    <button class="tab-btn active" id="tab-kb-btn" onclick="switchTab('kb')">
      <svg><use href="#ico-db"/></svg>Knowledge Base
    </button>
    <button class="tab-btn" id="tab-logs-btn" onclick="switchTab('logs')">
      <svg><use href="#ico-log"/></svg>Chat Logs
    </button>
  </div>

  <div class="tab-panel active" id="tab-kb">

    <!-- PASSWORD GATE -->
    <div id="kb-gate" style="display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;">
      <div class="kb-gate-icon"><svg><use href="#ico-lock"/></svg></div>
      <div style="text-align:center;">
        <div class="kb-gate-title">Knowledge Base Access</div>
        <div class="kb-gate-sub" style="margin-top:4px;">// Restricted — Authorised Personnel Only</div>
      </div>
      <div class="kb-gate-form" id="kb-gate-form">
        <div class="kb-pw-wrap">
          <input type="password" id="kbPassword" placeholder="Enter access code" autocomplete="off" maxlength="20"/>
          <button class="kb-toggle-pw" onclick="togglePwVisibility()" type="button" tabindex="-1">
            <svg id="pwToggleIco"><use href="#ico-eye"/></svg>
          </button>
        </div>
        <button id="kbUnlockBtn" onclick="tryUnlockKB()">
          <svg><use href="#ico-unlock"/></svg>Unlock Access
        </button>
        <div class="kb-error" id="kbError">Password မမှန်ပါ။ ထပ်ကြိုးစားပါ</div>
        <div class="kb-attempts" id="kbAttempts"></div>
      </div>
    </div>

    <!-- KB CONTENT (shown after unlock) -->
    <div class="kb-content" id="kb-content">
      <div class="kb-unlocked-bar">
        <svg><use href="#ico-shield"/></svg>
        <span class="kb-unlocked-txt">Access Granted</span>
        <button class="kb-lock-btn" onclick="lockKBAgain()">Lock</button>
      </div>
      <div class="panel-lbl">// knowledge_base.config</div>
      <textarea id="knowledgeBase" placeholder="Knowledge Base အချက်အလက်များ ဖြည့်သွင်းပါ..."></textarea>
      <button id="saveBtn" onclick="saveToCloud()">
        <svg><use href="#ico-upload"/></svg>Push to Cloud
      </button>
    </div>

  </div>

  <div class="tab-panel" id="tab-logs">
    <div class="panel-lbl">// recent_sessions.log</div>
    <div class="log-box" id="logBox"><div class="log-empty">Loading sessions…</div></div>
  </div>
</div>

<div class="shell">
  <button class="scroll-fab" id="scrollFab" onclick="scrollDown()">
    <svg><use href="#ico-chevdown"/></svg>
  </button>

  <header>
    <div class="hd-logo" id="logoBtn" onclick="secretClick(event)">
      <svg><use href="#ico-logo"/></svg>
    </div>
    <div class="hd-info">
      <div class="hd-name">NovaBETT – Game</div>
      <div class="hd-tagline">
        <span class="hd-tagline-dot"></span>
        <span class="hd-tagline-txt">Online · Premium AI Support</span>
      </div>
    </div>
    <div class="hd-right">
      <div class="hd-stat">
        <div class="hd-stat-num"><svg><use href="#ico-users"/></svg><span id="onlineNum">247</span></div>
        <div class="hd-stat-lbl">Online Now</div>
      </div>
      <button class="hd-admin-btn" onclick="openAdmin()"><svg><use href="#ico-settings"/></svg></button>
    </div>
  </header>

  <div class="chatbox" id="chatbox"></div>

  <div class="quick-grid">
    <button class="q-btn" onclick="quickSend('အကောင့်ဖွင့်နည်း သိချင်ပါတယ်')"><svg><use href="#ico-account"/></svg>အကောင့်</button>
    <button class="q-btn" onclick="quickSend('ငွေသွင်းနည်း ရှင်းပြပေးပါ')"><svg><use href="#ico-wallet"/></svg>ငွေသွင်းနည်း</button>
    <button class="q-btn" onclick="quickSend('ပရိုမိုးရှင်းတွေ ပြောပြပါ')"><svg><use href="#ico-gift"/></svg>ပရိုမိုးရှင်း</button>
    <button class="q-btn" onclick="quickSend('ဂိမ်းအနိုင်ခန်းများ ကြည့်ချင်ပါ')"><svg><use href="#ico-trophy"/></svg>အနိုင်ခန်း</button>
    <button class="q-btn" onclick="quickSend('Password ပြောင်းနည်း သိချင်ပါ')"><svg><use href="#ico-key"/></svg>Password</button>
    <button class="q-btn" onclick="quickSend('Live Support နဲ့ ဆက်သွယ်ချင်ပါတယ်')"><svg><use href="#ico-signal"/></svg>Live Support</button>
  </div>

  <footer>
    <div class="input-field-wrap">
      <input type="text" id="userInput" placeholder="မေးမြန်းလိုသည်များ ရိုက်ထည့်ပါ..." onkeydown="if(event.key==='Enter')handleSend()"/>
    </div>
    <button class="send-btn" id="sendBtn" onclick="handleSend()">
      <svg><use href="#ico-send"/></svg>
    </button>
  </footer>
</div>

<script src="app.js"></script>
</body>
  </html>
